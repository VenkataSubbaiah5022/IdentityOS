services:
  identity-api:
    build:
      context: ../..
      dockerfile: apps/identity-api/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: identityos
    volumes:
      - postgres_prod:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_prod:/data

volumes:
  postgres_prod:
  redis_prod:
